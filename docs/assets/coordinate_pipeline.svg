<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Coordinate compression pipeline</title>
  <desc id="desc">Text or bytes are converted into byte IDs, folded into layer 1 and layer 2 coordinates, stored as a payload, and decoded back exactly.</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L0,6 L9,3 z" fill="#25324d"/>
    </marker>
    <style>
      .bg { fill: #f7f9fc; }
      .box { fill: #ffffff; stroke: #25324d; stroke-width: 2; rx: 10; }
      .accent { fill: #e9f4ff; stroke: #1d72b8; stroke-width: 2; rx: 10; }
      .payload { fill: #fff5e8; stroke: #bf6f13; stroke-width: 2; rx: 10; }
      .title { font: 700 22px Arial, sans-serif; fill: #172033; }
      .label { font: 700 17px Arial, sans-serif; fill: #172033; }
      .small { font: 14px Arial, sans-serif; fill: #4a5568; }
      .code { font: 14px "SFMono-Regular", Consolas, monospace; fill: #172033; }
      .arrow { stroke: #25324d; stroke-width: 2.5; marker-end: url(#arrow); fill: none; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1200" height="420"/>
  <text class="title" x="40" y="45">CoordCompressCodec Pipeline</text>

  <rect class="box" x="45" y="95" width="175" height="120"/>
  <text class="label" x="75" y="132">Input</text>
  <text class="small" x="75" y="160">text, logs, JSON, CSV</text>
  <text class="code" x="75" y="188">GET /api/users</text>

  <path class="arrow" d="M225 155 H300"/>
  <rect class="box" x="310" y="95" width="175" height="120"/>
  <text class="label" x="340" y="132">Byte IDs</text>
  <text class="small" x="340" y="160">lossless base layer</text>
  <text class="code" x="340" y="188">71 69 84 32 ...</text>

  <path class="arrow" d="M490 155 H565"/>
  <rect class="accent" x="575" y="80" width="190" height="150"/>
  <text class="label" x="610" y="122">Layer 1</text>
  <text class="small" x="610" y="150">fold recurring byte</text>
  <text class="small" x="610" y="172">phrases into C IDs</text>
  <text class="code" x="610" y="202">C256 C257 32 ...</text>

  <path class="arrow" d="M770 155 H845"/>
  <rect class="accent" x="855" y="80" width="190" height="150"/>
  <text class="label" x="890" y="122">Layer 2+</text>
  <text class="small" x="890" y="150">fold coordinate</text>
  <text class="small" x="890" y="172">sequences again</text>
  <text class="code" x="890" y="202">C900 C901 ...</text>

  <path class="arrow" d="M950 235 V278 H650"/>
  <rect class="payload" x="465" y="270" width="255" height="95"/>
  <text class="label" x="505" y="307">DCC1 Payload</text>
  <text class="small" x="505" y="334">varints + checksum</text>
  <text class="small" x="505" y="354">optional zlib/lzma/bz2</text>

  <path class="arrow" d="M460 318 H305"/>
  <rect class="box" x="85" y="270" width="220" height="95"/>
  <text class="label" x="120" y="307">Exact Decode</text>
  <text class="small" x="120" y="334">expand coordinates</text>
  <text class="small" x="120" y="354">verify SHA-256</text>

  <path class="arrow" d="M195 270 V225"/>
</svg>
